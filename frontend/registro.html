<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ciudadano — CURP Validator</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <main class="contenedor">
        <header class="encabezado">
            <h1>CURP Validator</h1>
            <p>Plan por México S.A. de C.V.</p>
        </header>

        <section class="tarjeta">
            <h2>Registro de ciudadano</h2>
            <p class="descripcion">Ingresa los datos del ciudadano para registrarlo en el sistema.</p>

            <form id="formRegistro" novalidate>
                <div class="campo">
                    <label for="nombre">Nombre(s)</label>
                    <input type="text" id="nombre" name="nombre" maxlength="100" required>
                </div>

                <div class="campo">
                    <label for="primerApellido">Apellido paterno</label>
                    <input type="text" id="primerApellido" name="primerApellido" maxlength="100" required>
                </div>

                <div class="campo">
                    <label for="segundoApellido">Apellido materno</label>
                    <input type="text" id="segundoApellido" name="segundoApellido" maxlength="100" required>
                </div>

                <div class="campo">
                    <label for="curp">CURP</label>
                    <input type="text" id="curp" name="curp" maxlength="18" required
                           pattern="^[A-Za-z]{1}[AEIOUaeiou]{1}[A-Za-z]{2}[0-9]{2}(0[1-9]|1[0-2])(0[1-9]|[12][0-9]|3[01])[HMhm]{1}[A-Za-z]{2}[B-DF-HJ-NP-TV-Zb-df-hj-np-tv-z]{3}[0-9A-Za-z]{1}[0-9]{1}$"
                           title="Ingresa una CURP válida de 18 caracteres">
                </div>

                <button type="submit" class="btn primario">Registrar ciudadano</button>
            </form>

            <div id="mensaje" class="mensaje oculto" role="alert"></div>
        </section>

        <nav class="navegacion">
            <a href="/carga-curp.html">Ir a validación de documento →</a>
        </nav>
    </main>

    <script>
        const form = document.getElementById('formRegistro');
        const mensaje = document.getElementById('mensaje');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            mensaje.className = 'mensaje oculto';

            const payload = {
                nombre: form.nombre.value.trim(),
                primerApellido: form.primerApellido.value.trim(),
                segundoApellido: form.segundoApellido.value.trim(),
                curp: form.curp.value.trim().toUpperCase()
            };

            try {
                const respuesta = await fetch('/api/ciudadanos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const datos = await respuesta.json();

                if (!respuesta.ok) {
                    const detalle = datos.details ? datos.details.join(', ') : datos.message;
                    mostrarMensaje(detalle || 'Error al registrar', 'error');
                    return;
                }

                sessionStorage.setItem('ciudadanoId', datos.id);
                sessionStorage.setItem('ciudadanoCurp', datos.curp);
                mostrarMensaje(
                    `Ciudadano registrado (ID: ${datos.id}). Redirigiendo a validación de documento...`,
                    'exito'
                );
                setTimeout(() => {
                    window.location.href = `/carga-curp.html?id=${datos.id}&curp=${encodeURIComponent(datos.curp)}`;
                }, 1500);
            } catch (error) {
                mostrarMensaje('No se pudo conectar con el servidor', 'error');
            }
        });

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.className = `mensaje ${tipo}`;
        }
    </script>
</body>
</html>
