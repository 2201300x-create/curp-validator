spring.application.name=curp-validator

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/curp_validator
spring.datasource.username=tu_usuario
spring.datasource.password=tu password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Límite de registros para fase de prueba (muestra inicial)
app.registro.limite=10

# Carpeta de evidencias
app.evidencias.path=src/main/resources/evidencias/

# Ruta de datos de Tesseract (opcional; dejar vacío si está en el PATH del sistema)
app.tesseract.datapath=

# Tamaño máximo de archivo para subir PDFs
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB